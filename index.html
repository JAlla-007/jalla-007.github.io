<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>St. Donats - 3D Viewer</title>
    <style>
        body { margin: 0; background: black; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
<div id="info">Loading...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>


<script type="module">
import * as GaussianSplats3D from 'https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js';

const info = document.getElementById('info');
const viewer = new GaussianSplats3D.Viewer({
    initialCameraPosition: [0, 1, 3],
    initialCameraLookAt: [0, 0, 0]
});

async function loadScene() {
    try {
        const response = await fetch('./dn.ksplat');
        if (!response.ok) {
            throw new Error(`HTTP ${response.status} while fetching dn.ksplat`);
        }

        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);

        await viewer.addSplatScene(blobUrl, {
            format: GaussianSplats3D.SceneFormat.KSplat,
            showLoadingUI: true,
            progressiveLoad: false
        });

        info.innerText = 'Loaded - drag to rotate';
        viewer.start();
    } catch (err) {
        console.error(err);
        info.innerText = `Failed to load model: ${err.message}`;
    }
}

loadScene();
</script>

</body>
</html>
