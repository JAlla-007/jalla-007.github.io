<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>St. Donats Virtual Tour</title>
    <script src="https://unpkg.com/@lumaai/luma-web@0.2.0/dist/library/luma-web.umd.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; overflow: hidden; font-family: sans-serif; }
        #loader { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 1.2rem; z-index: 100; 
        }
    </style>
</head>
<body>

    <div id="loader">Initializing St. Donats Scan...</div>

   <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.157.0/build/three.module.js';

    // This "DOMContentLoaded" listener ensures the HTML is loaded first
    window.addEventListener('DOMContentLoaded', () => {
        
        // We also check if Luma exists. If not, we wait 100ms and try again.
        const startApp = () => {
            if (typeof Luma === 'undefined') {
                console.log("Luma not ready yet, retrying...");
                setTimeout(startApp, 100);
                return;
            }

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const splat = new Luma.LumaSplatsThree({
                source: 'st_donats.splat'
            });

            scene.add(splat);

            function animate() {
                requestAnimationFrame(animate);
                if (splat) splat.rotation.y += 0.001; 
                renderer.render(scene, camera);
            }

            animate();
            document.getElementById('loader').style.display = 'none';
        };

        startApp();
    });
</script>
</body>
</html>
