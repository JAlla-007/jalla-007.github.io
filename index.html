<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>St. Donats Virtual Tour</title>
    <script src="https://unpkg.com/@lumaai/luma-web@0.2.0/dist/library/luma-web.umd.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: white; display: flex; 
            align-items: center; justify-content: center; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="loader">Loading St. Donats...</div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.157.0/build/three.module.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Load the St. Donats Splat
        const splat = new Luma.LumaSplatsThree({
            source: 'St. Donats.splat' 
        });

        scene.add(splat);

        // Hide loader when the splat starts to show
        splat.onLoad = () => {
            document.getElementById('loader').style.display = 'none';
        };

        function animate() {
            requestAnimationFrame(animate);
            // Slowly rotate the campus for a cinematic look
            if (splat) splat.rotation.y += 0.002; 
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
