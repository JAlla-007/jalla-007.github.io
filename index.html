<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>St. Donats - 3D Viewer</title>
    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
        }

        #info {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            pointer-events: none;
            transition: opacity 0.45s ease;
        }

        #info.hidden {
            opacity: 0;
        }

        #nav {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%) translateY(-62px);
            width: min(560px, calc(100vw - 28px));
            z-index: 160;
            transition: transform 0.35s ease;
        }

        #nav:hover,
        #nav.is-visible {
            transform: translateX(-50%) translateY(14px);
        }

        .nav-shell {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 20px;
            background: rgba(15, 15, 15, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(14px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
        }

        .nav-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
            border-radius: 14px;
            color: rgba(255, 255, 255, 0.92);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 13px;
            letter-spacing: 0.06em;
            text-decoration: none;
            text-transform: uppercase;
            transition: background 0.2s ease, transform 0.2s ease, color 0.2s ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-1px);
        }

        .nav-icon {
            font-size: 15px;
            line-height: 1;
        }

        .loading-shell {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 24px 28px;
            border-radius: 999px;
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04));
            border: 1px solid rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        }

        .loading-ring {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.16);
            border-top-color: rgba(255, 255, 255, 0.95);
            animation: spin 0.9s linear infinite;
        }

        .loading-text {
            color: rgba(255, 255, 255, 0.94);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 12px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            padding-left: 0.28em;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        #hint {
            position: fixed;
            left: 50%;
            bottom: 22px;
            transform: translateX(-50%);
            z-index: 120;
            max-width: min(92vw, 420px);
            padding: 12px 16px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.58);
            border: 1px solid rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(12px);
            color: rgba(255, 255, 255, 0.88);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 12px;
            line-height: 1.4;
            text-align: center;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        #hint.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(10px);
        }

        #gesture-status {
            position: fixed;
            left: 16px;
            bottom: 18px;
            z-index: 140;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(10px);
            color: rgba(255, 255, 255, 0.82);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 11px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        #gesture-status strong {
            color: white;
            font-weight: 600;
        }

        #hero-title {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 130;
            pointer-events: none;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 2s ease, transform 2s ease;
        }

        #hero-title.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #hero-title.hidden {
            opacity: 0;
            transform: translateY(-10px);
        }

        .hero-text {
            max-width: min(92vw, 980px);
            padding: 0 24px;
            color: rgba(255, 255, 255, 0.94);
            font-family: "Times New Roman", Times, serif;
            font-size: clamp(40px, 7vw, 92px);
            font-weight: 700;
            letter-spacing: 0.03em;
            line-height: 0.95;
            text-align: center;
            text-shadow:
                0 1px 0 rgba(255, 255, 255, 0.12),
                0 12px 24px rgba(0, 0, 0, 0.42),
                0 24px 60px rgba(0, 0, 0, 0.48);
        }
    </style>
</head>
<body>
<div id="info">
    <div class="loading-shell">
        <div class="loading-ring" aria-hidden="true"></div>
        <div class="loading-text">Loading</div>
    </div>
</div>

<nav id="nav" aria-label="Primary">
    <div class="nav-shell">
        <a class="nav-link" href="#more" aria-label="More">
            <span class="nav-icon">+</span>
            <span>More</span>
        </a>
        <a class="nav-link" href="#home" aria-label="Homepage">
            <span class="nav-icon">⌂</span>
            <span>Home</span>
        </a>
        <a class="nav-link" href="#help" aria-label="Help">
            <span class="nav-icon">?</span>
            <span>Help</span>
        </a>
    </div>
</nav>

<div id="hero-title">
    <div class="hero-text">Atlantic College Memo</div>
</div>

<div id="hint">
    Drag to orbit. Scroll to zoom. Shift+drag to pan.
</div>

<div id="gesture-status">
    Gesture control: <strong>starting</strong>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/+esm"
  }
}
</script>

<script type="module">
import * as GaussianSplats3D from 'https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js';
import { FilesetResolver, HandLandmarker } from '@mediapipe/tasks-vision';
import * as THREE from 'three';

const info = document.getElementById('info');
const hint = document.getElementById('hint');
const nav = document.getElementById('nav');
const gestureStatus = document.getElementById('gesture-status');
const heroTitle = document.getElementById('hero-title');
const viewer = new GaussianSplats3D.Viewer({
    initialCameraPosition: [0, -8, 8],
    initialCameraLookAt: [0, 0, 0],
    sharedMemoryForWorkers: false,
    gpuAcceleratedSort: false,
    dynamicScene: true,
    sceneRevealMode: GaussianSplats3D.SceneRevealMode.Gradual,
    sceneFadeInRateMultiplier: 0.8
});

const initialView = {
    position: new THREE.Vector3(0, -8, 8),
    target: new THREE.Vector3(0, 0, 0)
};
const modelRotation = new THREE.Quaternion().setFromEuler(new THREE.Euler(Math.PI, 0, 0));
let motionFrame = null;
let handLandmarker = null;
let webcamVideo = null;
let gestureFrame = null;
let currentGesture = 'idle';
let lastGestureAt = 0;
const minZoomDistance = 4;
const maxZoomDistance = 22;
const gestureCenter = { x: 0.5, y: 0.5 };

function startAmbientMotion() {
    const splatScene = viewer.getSplatScene(0);
    if (!splatScene) return;

    const basePosition = splatScene.position.clone();
    const baseQuaternion = splatScene.quaternion.clone();
    const baseScale = splatScene.scale.clone();
    const startTime = performance.now();

    const animateScene = () => {
        const t = (performance.now() - startTime) * 0.001;
        const intro = Math.min(t / 2.4, 1);
        const easedIntro = 1 - Math.pow(1 - intro, 3);

        splatScene.position.copy(basePosition);
        splatScene.position.y += (1 - easedIntro) * 0.35;
        splatScene.quaternion.copy(baseQuaternion);
        splatScene.scale.copy(baseScale).multiplyScalar(0.94 + easedIntro * 0.06);

        viewer.splatMesh.updateTransforms();
        if (intro < 1) {
            motionFrame = window.requestAnimationFrame(animateScene);
        } else {
            motionFrame = null;
        }
    };

    motionFrame = window.requestAnimationFrame(animateScene);
}

function getControls() {
    return viewer.controls;
}

function orbit(deltaTheta = 0, deltaPhi = 0) {
    const controls = getControls();
    if (!controls) return;

    const offset = viewer.camera.position.clone().sub(controls.target);
    const spherical = new THREE.Spherical().setFromVector3(offset);
    spherical.theta += deltaTheta;
    spherical.phi = THREE.MathUtils.clamp(spherical.phi + deltaPhi, 0.1, Math.PI - 0.1);
    offset.setFromSpherical(spherical);
    viewer.camera.position.copy(controls.target).add(offset);
    viewer.camera.lookAt(controls.target);
    controls.update();
}

function pan(deltaX = 0, deltaY = 0) {
    const controls = getControls();
    if (!controls) return;

    const camera = viewer.camera;
    const distance = camera.position.distanceTo(controls.target);
    const amount = Math.max(distance * 0.08, 0.05);
    const forward = controls.target.clone().sub(camera.position).normalize();
    const right = new THREE.Vector3().crossVectors(forward, camera.up).normalize();
    const up = camera.up.clone().normalize();
    const shift = right.multiplyScalar(deltaX * amount).add(up.multiplyScalar(deltaY * amount));

    camera.position.add(shift);
    controls.target.add(shift);
    camera.lookAt(controls.target);
    controls.update();
}

function zoom(direction) {
    const controls = getControls();
    if (!controls) return;

    const offset = viewer.camera.position.clone().sub(controls.target);
    const scale = direction > 0 ? 0.85 : 1.15;
    offset.multiplyScalar(scale);
    viewer.camera.position.copy(controls.target).add(offset);
    viewer.camera.lookAt(controls.target);
    controls.update();
}

function resetView() {
    const controls = getControls();
    if (!controls) return;

    viewer.camera.position.copy(initialView.position);
    controls.target.copy(initialView.target);
    viewer.camera.lookAt(controls.target);
    controls.update();
}

function runAction(action) {
    const step = 0.18;
    switch (action) {
        case 'orbit-left': orbit(-step, 0); break;
        case 'orbit-right': orbit(step, 0); break;
        case 'orbit-up': orbit(0, -step); break;
        case 'orbit-down': orbit(0, step); break;
        case 'pan-left': pan(-1, 0); break;
        case 'pan-right': pan(1, 0); break;
        case 'pan-up': pan(0, 1); break;
        case 'pan-down': pan(0, -1); break;
        case 'zoom-in': zoom(1); break;
        case 'zoom-out': zoom(-1); break;
        case 'reset': resetView(); break;
    }
}

function hideHint() {
    if (!hint || hint.classList.contains('hidden')) return;
    hint.classList.add('hidden');
    window.setTimeout(() => {
        hint.style.display = 'none';
    }, 350);
}

function hideHeroTitle() {
    if (!heroTitle || !heroTitle.classList.contains('visible') || heroTitle.classList.contains('hidden')) return;
    heroTitle.classList.add('hidden');
    window.setTimeout(() => {
        heroTitle.style.display = 'none';
    }, 2000);
}

function showHeroTitle() {
    if (!heroTitle) return;
    heroTitle.style.display = 'flex';
    heroTitle.classList.remove('hidden');
    window.requestAnimationFrame(() => {
        heroTitle.classList.add('visible');
    });
}

function setGestureStatus(label, detail = '') {
    gestureStatus.innerHTML = `Gesture control: <strong>${label}</strong>${detail ? ` ${detail}` : ''}`;
}

window.setTimeout(hideHint, 4500);

window.addEventListener('pointerdown', hideHint, { once: true });
window.addEventListener('wheel', hideHint, { once: true });
window.addEventListener('keydown', hideHint, { once: true });
window.addEventListener('pointerdown', hideHeroTitle, { once: true });
window.addEventListener('wheel', hideHeroTitle, { once: true });
window.addEventListener('keydown', hideHeroTitle, { once: true });

let navHideTimer = null;

function showNavTemporarily() {
    nav.classList.add('is-visible');
    if (navHideTimer) window.clearTimeout(navHideTimer);
    navHideTimer = window.setTimeout(() => {
        if (!nav.matches(':hover')) {
            nav.classList.remove('is-visible');
        }
    }, 1600);
}

window.addEventListener('mousemove', (event) => {
    if (event.clientY < 90) {
        showNavTemporarily();
    }
});

nav.addEventListener('mouseleave', () => {
    navHideTimer = window.setTimeout(() => {
        nav.classList.remove('is-visible');
    }, 220);
});

function setCameraDistance(nextDistance) {
    const controls = getControls();
    if (!controls) return;

    const offset = viewer.camera.position.clone().sub(controls.target).normalize();
    const clampedDistance = THREE.MathUtils.clamp(nextDistance, minZoomDistance, maxZoomDistance);
    viewer.camera.position.copy(controls.target).add(offset.multiplyScalar(clampedDistance));
    viewer.camera.lookAt(controls.target);
    controls.update();
}

function applyGestureZoom(gesture) {
    const controls = getControls();
    if (!controls) return;

    const currentDistance = viewer.camera.position.distanceTo(controls.target);
    if (gesture === 'open-palm') {
        setCameraDistance(currentDistance * 0.975);
    } else if (gesture === 'fist') {
        setCameraDistance(currentDistance * 1.03);
    }
}

function isFingerExtended(landmarks, tipIndex, pipIndex) {
    return landmarks[tipIndex].y < landmarks[pipIndex].y;
}

function classifyGesture(landmarks) {
    const wrist = landmarks[0];
    const fingertips = [4, 8, 12, 16, 20];
    const spread = fingertips.reduce((sum, index) => {
        return sum + Math.hypot(landmarks[index].x - wrist.x, landmarks[index].y - wrist.y);
    }, 0) / fingertips.length;

    const openCount = [
        isFingerExtended(landmarks, 8, 6),
        isFingerExtended(landmarks, 12, 10),
        isFingerExtended(landmarks, 16, 14),
        isFingerExtended(landmarks, 20, 18)
    ].filter(Boolean).length;

    const thumbOpen = Math.abs(landmarks[4].x - landmarks[3].x) > 0.04;
    const indexExtended = isFingerExtended(landmarks, 8, 6);
    const middleExtended = isFingerExtended(landmarks, 12, 10);
    const ringExtended = isFingerExtended(landmarks, 16, 14);
    const pinkyExtended = isFingerExtended(landmarks, 20, 18);

    if (openCount >= 3 && thumbOpen && spread > 0.22) return 'open-palm';
    if (openCount <= 1 && spread < 0.16) return 'fist';
    if (indexExtended && !middleExtended && !ringExtended && !pinkyExtended) return 'point';
    return 'idle';
}

function getPointDirection(landmarks) {
    const indexTip = landmarks[8];
    const dx = indexTip.x - gestureCenter.x;
    const dy = indexTip.y - gestureCenter.y;
    const deadZone = 0.12;

    if (Math.abs(dx) < deadZone && Math.abs(dy) < deadZone) return null;
    if (Math.abs(dx) > Math.abs(dy)) {
        return dx > 0 ? 'right' : 'left';
    }
    return dy > 0 ? 'down' : 'up';
}

function applyDirectionalGesture(direction) {
    if (!direction) return;

    const orbitStep = 0.025;
    switch (direction) {
        case 'left':
            orbit(-orbitStep, 0);
            break;
        case 'right':
            orbit(orbitStep, 0);
            break;
        case 'up':
            orbit(0, -orbitStep);
            break;
        case 'down':
            orbit(0, orbitStep);
            break;
    }
}

async function startGestureControls() {
    try {
        setGestureStatus('requesting camera');

        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'user',
                width: { ideal: 640 },
                height: { ideal: 480 }
            },
            audio: false
        });

        webcamVideo = document.createElement('video');
        webcamVideo.playsInline = true;
        webcamVideo.muted = true;
        webcamVideo.autoplay = true;
        webcamVideo.srcObject = stream;
        await webcamVideo.play();

        const vision = await FilesetResolver.forVisionTasks(
            'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm'
        );

        handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: {
                modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task'
            },
            runningMode: 'VIDEO',
            numHands: 1
        });

        setGestureStatus('ready', 'palm = zoom in, fist = zoom out, point = steer');

        const detectGestures = () => {
            if (!handLandmarker || !webcamVideo || webcamVideo.readyState < 2) {
                gestureFrame = window.requestAnimationFrame(detectGestures);
                return;
            }

            const now = performance.now();
            const result = handLandmarker.detectForVideo(webcamVideo, now);
            const landmarks = result.landmarks?.[0];
            const nextGesture = landmarks ? classifyGesture(landmarks) : 'idle';
            const direction = nextGesture === 'point' && landmarks ? getPointDirection(landmarks) : null;

            if (nextGesture !== currentGesture) {
                currentGesture = nextGesture;
                lastGestureAt = now;
                if (nextGesture === 'open-palm') {
                    setGestureStatus('zooming in');
                } else if (nextGesture === 'fist') {
                    setGestureStatus('zooming out');
                } else if (nextGesture === 'point') {
                    setGestureStatus('steering', direction ? direction : 'hold near center to pause');
                } else {
                    setGestureStatus('ready', 'palm = zoom in, fist = zoom out, point = steer');
                }
            }

            if (currentGesture === 'point' && direction && now - lastGestureAt > 65) {
                applyDirectionalGesture(direction);
                setGestureStatus('steering', direction);
                lastGestureAt = now;
            } else if ((currentGesture === 'open-palm' || currentGesture === 'fist') && now - lastGestureAt > 65) {
                applyGestureZoom(currentGesture);
                lastGestureAt = now;
            }

            gestureFrame = window.requestAnimationFrame(detectGestures);
        };

        gestureFrame = window.requestAnimationFrame(detectGestures);
    } catch (err) {
        console.error(err);
        setGestureStatus('camera unavailable');
    }
}

window.addEventListener('keydown', (event) => {
    if (event.repeat) return;
    if (['INPUT', 'TEXTAREA'].includes(document.activeElement?.tagName)) return;

    switch (event.key) {
        case 'ArrowLeft': runAction('orbit-left'); break;
        case 'ArrowRight': runAction('orbit-right'); break;
        case 'ArrowUp': runAction('orbit-up'); break;
        case 'ArrowDown': runAction('orbit-down'); break;
        case 'a':
        case 'A': runAction('pan-left'); break;
        case 'd':
        case 'D': runAction('pan-right'); break;
        case 'w':
        case 'W': runAction('pan-up'); break;
        case 's':
        case 'S': runAction('pan-down'); break;
        case 'q':
        case 'Q': runAction('zoom-in'); break;
        case 'e':
        case 'E': runAction('zoom-out'); break;
        case 'r':
        case 'R': runAction('reset'); break;
        default: return;
    }

    event.preventDefault();
});

async function loadScene() {
    try {
        const response = await fetch('./PK.ksplat');
        if (!response.ok) {
            throw new Error(`HTTP ${response.status} while fetching PK.ksplat`);
        }

        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);

        await viewer.addSplatScene(blobUrl, {
            format: GaussianSplats3D.SceneFormat.KSplat,
            rotation: [modelRotation.x, modelRotation.y, modelRotation.z, modelRotation.w],
            showLoadingUI: false,
            progressiveLoad: false
        });

        if (viewer.controls) {
            viewer.controls.minPolarAngle = 0;
            viewer.controls.maxPolarAngle = Math.PI;
            viewer.controls.enablePan = true;
            viewer.controls.update();
        }

        info.classList.add('hidden');
        window.setTimeout(() => {
            info.style.display = 'none';
        }, 450);
        viewer.start();
        startAmbientMotion();
        startGestureControls();
        showHeroTitle();
    } catch (err) {
        console.error(err);
        info.innerHTML = `
            <div class="loading-shell">
                <div class="loading-text">Load failed</div>
            </div>
        `;
    }
}

loadScene();
</script>

</body>
</html>
