<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>St. Donats - 3D Viewer</title>
    <style>
        body { margin: 0; background-color: #000; color: white; overflow: hidden; font-family: sans-serif; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; }
    </style>
</head>
<body>
    <div id="info">Loading St. Donats Scan...</div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.157.0/build/three.module.js';
        import { OrbitControls } from 'https://unpkg.com/three@0.157.0/examples/jsm/controls/OrbitControls.js';

        // This is a direct, open-source Splat loader
        import { PlyLoader } from 'https://cdn.jsdelivr.net/npm/@antimatter15/splat-loader@1.0.1/index.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);

        // This loader is much more reliable than Luma for custom websites
        const loader = new PlyLoader();
        
        // Make sure your file is named exactly st_donats.splat or .ply
        loader.load('st_donats.splat', (splat) => {
            scene.add(splat);
            document.getElementById('info').innerHTML = 'St. Donats Castle - Use Mouse to Rotate';
            console.log("Splat Loaded!");
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
