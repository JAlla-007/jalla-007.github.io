<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>St. Donats - 3D Viewer</title>
    <style>
        body { margin: 0; background: black; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
<div id="info">Loading...</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
}
</script>

<script type="module">
import { Viewer } from 'https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js';

const viewer = new Viewer({
    initialCameraPosition: [0, 1, 3],
    initialCameraLookAt: [0, 0, 0]
});

viewer.addSplatScene('./Donats.splat')
.then(() => {
    document.getElementById('info').innerText = 'Loaded — drag to rotate';
    viewer.start();
})
.catch(err => {
    console.error(err);
    document.getElementById('info').innerText = 'Failed to load model or viewer library';
});
</script>

</body>
</html>
