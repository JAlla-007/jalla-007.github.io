<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>St. Donats Virtual Tour</title>
    <style>
        body { margin: 0; background: #000; color: white; overflow: hidden; font-family: sans-serif; }
        #loader { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 1.2rem; z-index: 100; font-weight: bold;
        }
    </style>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
            "@lumaai/luma-web": "https://unpkg.com/@lumaai/luma-web@0.2.0/dist/library/luma-web.esm.js"
        }
    }
    </script>
</head>
<body>

    <div id="loader">Initializing St. Donats Scan...</div>

    <script type="module">
        // We import them directly from the map above. No waiting required!
        import * as THREE from 'three';
        import { LumaSplatsThree } from '@lumaai/luma-web';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // Pulled the camera back a bit so the castle isn't too close
        camera.position.z = 10; 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Load the Splat!
        const splat = new LumaSplatsThree({
            source: 'st_donats.splat'
        });

        scene.add(splat);

        function animate() {
            requestAnimationFrame(animate);
            // Slowly spin the castle
            if (splat) splat.rotation.y += 0.001; 
            renderer.render(scene, camera);
        }

        animate();
        
        // Hide the loader text
        document.getElementById('loader').style.display = 'none';
    </script>
</body>
</html>
