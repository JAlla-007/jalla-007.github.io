<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>St. Donats - 3D Viewer</title>
    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
        }

        #info {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            pointer-events: none;
            transition: opacity 0.45s ease;
        }

        #info.hidden {
            opacity: 0;
        }

        .loading-shell {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 24px 28px;
            border-radius: 999px;
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04));
            border: 1px solid rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        }

        .loading-ring {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.16);
            border-top-color: rgba(255, 255, 255, 0.95);
            animation: spin 0.9s linear infinite;
        }

        .loading-text {
            color: rgba(255, 255, 255, 0.94);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 12px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            padding-left: 0.28em;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        #controls {
            position: absolute;
            right: 16px;
            bottom: 16px;
            z-index: 100;
            display: grid;
            gap: 10px;
            color: white;
            font-family: sans-serif;
        }

        .control-panel {
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 10px;
            backdrop-filter: blur(8px);
        }

        .control-title {
            margin-bottom: 8px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.75;
        }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(3, 44px);
            gap: 6px;
        }

        .zoom-grid {
            display: grid;
            grid-template-columns: repeat(2, 44px);
            gap: 6px;
        }

        button {
            width: 44px;
            height: 44px;
            border: 0;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.14);
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.22);
        }

        button:active {
            background: rgba(255, 255, 255, 0.3);
        }

        #hint {
            max-width: 220px;
            font-size: 12px;
            line-height: 1.4;
            opacity: 0.8;
        }
    </style>
</head>
<body>
<div id="info">
    <div class="loading-shell">
        <div class="loading-ring" aria-hidden="true"></div>
        <div class="loading-text">Loading</div>
    </div>
</div>

<div id="controls">
    <div class="control-panel">
        <div class="control-title">Orbit</div>
        <div class="control-grid">
            <div></div>
            <button data-action="orbit-up" aria-label="Orbit up">↑</button>
            <div></div>
            <button data-action="orbit-left" aria-label="Orbit left">←</button>
            <button data-action="reset" aria-label="Reset view">•</button>
            <button data-action="orbit-right" aria-label="Orbit right">→</button>
            <div></div>
            <button data-action="orbit-down" aria-label="Orbit down">↓</button>
            <div></div>
        </div>
    </div>

    <div class="control-panel">
        <div class="control-title">Pan</div>
        <div class="control-grid">
            <div></div>
            <button data-action="pan-up" aria-label="Pan up">↑</button>
            <div></div>
            <button data-action="pan-left" aria-label="Pan left">←</button>
            <div></div>
            <button data-action="pan-right" aria-label="Pan right">→</button>
            <div></div>
            <button data-action="pan-down" aria-label="Pan down">↓</button>
            <div></div>
        </div>
    </div>

    <div class="control-panel">
        <div class="control-title">Zoom</div>
        <div class="zoom-grid">
            <button data-action="zoom-in" aria-label="Zoom in">+</button>
            <button data-action="zoom-out" aria-label="Zoom out">-</button>
        </div>
    </div>

    <div class="control-panel" id="hint">
        Drag to orbit. Scroll to zoom. Shift+drag to pan. Keyboard: arrows orbit, WASD pan, Q/E zoom.
    </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as GaussianSplats3D from 'https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js';
import * as THREE from 'three';

const info = document.getElementById('info');
const viewer = new GaussianSplats3D.Viewer({
    initialCameraPosition: [0, 1, 3],
    initialCameraLookAt: [0, 0, 0],
    sharedMemoryForWorkers: false,
    gpuAcceleratedSort: false
});

const initialView = {
    position: new THREE.Vector3(0, 1, 3),
    target: new THREE.Vector3(0, 0, 0)
};

function getControls() {
    return viewer.controls;
}

function orbit(deltaTheta = 0, deltaPhi = 0) {
    const controls = getControls();
    if (!controls) return;

    const offset = viewer.camera.position.clone().sub(controls.target);
    const spherical = new THREE.Spherical().setFromVector3(offset);
    spherical.theta += deltaTheta;
    spherical.phi = THREE.MathUtils.clamp(spherical.phi + deltaPhi, 0.1, Math.PI - 0.1);
    offset.setFromSpherical(spherical);
    viewer.camera.position.copy(controls.target).add(offset);
    viewer.camera.lookAt(controls.target);
    controls.update();
}

function pan(deltaX = 0, deltaY = 0) {
    const controls = getControls();
    if (!controls) return;

    const camera = viewer.camera;
    const distance = camera.position.distanceTo(controls.target);
    const amount = Math.max(distance * 0.08, 0.05);
    const forward = controls.target.clone().sub(camera.position).normalize();
    const right = new THREE.Vector3().crossVectors(forward, camera.up).normalize();
    const up = camera.up.clone().normalize();
    const shift = right.multiplyScalar(deltaX * amount).add(up.multiplyScalar(deltaY * amount));

    camera.position.add(shift);
    controls.target.add(shift);
    camera.lookAt(controls.target);
    controls.update();
}

function zoom(direction) {
    const controls = getControls();
    if (!controls) return;

    const offset = viewer.camera.position.clone().sub(controls.target);
    const scale = direction > 0 ? 0.85 : 1.15;
    offset.multiplyScalar(scale);
    viewer.camera.position.copy(controls.target).add(offset);
    viewer.camera.lookAt(controls.target);
    controls.update();
}

function resetView() {
    const controls = getControls();
    if (!controls) return;

    viewer.camera.position.copy(initialView.position);
    controls.target.copy(initialView.target);
    viewer.camera.lookAt(controls.target);
    controls.update();
}

function runAction(action) {
    const step = 0.18;
    switch (action) {
        case 'orbit-left': orbit(-step, 0); break;
        case 'orbit-right': orbit(step, 0); break;
        case 'orbit-up': orbit(0, -step); break;
        case 'orbit-down': orbit(0, step); break;
        case 'pan-left': pan(-1, 0); break;
        case 'pan-right': pan(1, 0); break;
        case 'pan-up': pan(0, 1); break;
        case 'pan-down': pan(0, -1); break;
        case 'zoom-in': zoom(1); break;
        case 'zoom-out': zoom(-1); break;
        case 'reset': resetView(); break;
    }
}

function bindHold(button) {
    let timer = null;
    const action = button.dataset.action;

    const start = () => {
        runAction(action);
        if (action === 'reset') return;
        timer = window.setInterval(() => runAction(action), 80);
    };

    const stop = () => {
        if (timer) {
            window.clearInterval(timer);
            timer = null;
        }
    };

    button.addEventListener('pointerdown', start);
    button.addEventListener('pointerup', stop);
    button.addEventListener('pointerleave', stop);
    button.addEventListener('pointercancel', stop);
}

document.querySelectorAll('[data-action]').forEach(bindHold);

window.addEventListener('keydown', (event) => {
    if (event.repeat) return;
    if (['INPUT', 'TEXTAREA'].includes(document.activeElement?.tagName)) return;

    switch (event.key) {
        case 'ArrowLeft': runAction('orbit-left'); break;
        case 'ArrowRight': runAction('orbit-right'); break;
        case 'ArrowUp': runAction('orbit-up'); break;
        case 'ArrowDown': runAction('orbit-down'); break;
        case 'a':
        case 'A': runAction('pan-left'); break;
        case 'd':
        case 'D': runAction('pan-right'); break;
        case 'w':
        case 'W': runAction('pan-up'); break;
        case 's':
        case 'S': runAction('pan-down'); break;
        case 'q':
        case 'Q': runAction('zoom-in'); break;
        case 'e':
        case 'E': runAction('zoom-out'); break;
        case 'r':
        case 'R': runAction('reset'); break;
        default: return;
    }

    event.preventDefault();
});

async function loadScene() {
    try {
        const response = await fetch('./dn.ksplat');
        if (!response.ok) {
            throw new Error(`HTTP ${response.status} while fetching dn.ksplat`);
        }

        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);

        await viewer.addSplatScene(blobUrl, {
            format: GaussianSplats3D.SceneFormat.KSplat,
            showLoadingUI: false,
            progressiveLoad: false
        });

        info.classList.add('hidden');
        window.setTimeout(() => {
            info.style.display = 'none';
        }, 450);
        viewer.start();
    } catch (err) {
        console.error(err);
        info.innerHTML = `
            <div class="loading-shell">
                <div class="loading-text">Load failed</div>
            </div>
        `;
    }
}

loadScene();
</script>

</body>
</html>
