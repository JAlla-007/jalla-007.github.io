        return false;
    }
    const x = ((projectedPoint.x + 1) / 2) * window.innerWidth;
    const y = ((-projectedPoint.y + 1) / 2) * window.innerHeight;
    element.style.left = `${x}px`;
    element.style.top = `${y}px`;
    element.classList.add('visible');
    return true;
}
function updateSceneHotspot() {
    if (!sceneHotspot || !viewer.camera) {
        window.requestAnimationFrame(updateSceneHotspot);
        return;
    }
    if (projectSceneBeacon(hotspotAnchor, sceneHotspot)) {
        const cameraDistance = viewer.camera.position.distanceTo(hotspotAnchor);
        sceneHotspot.classList.toggle('near', cameraDistance <= HOTSPOT_REVEAL_DISTANCE);
    }
    window.requestAnimationFrame(updateSceneHotspot);
}
function ensureMemoryBeacons() {
    if (memoryBeaconElements.length) return;
    memoryBeaconElements = MEMORY_BEACONS.map((memory) => {
        const element = document.createElement('button');
        element.type = 'button';
        element.className = 'scene-beacon memory-beacon';
        element.setAttribute('aria-label', `Open memory ${memory.title}`);
        element.innerHTML = `<span class="scene-beacon-core" aria-hidden="true"></span><span class="scene-beacon-label">${memory.label}</span>`;
        element.addEventListener('click', () => {
            if (!element.classList.contains('near')) return;
            memoryKicker.textContent = memory.kicker;
            memoryTitle.textContent = memory.title;
            memoryCopy.textContent = memory.copy;
            memoryOverlay.classList.add('visible');
            memoryOverlay.setAttribute('aria-hidden', 'false');
        });
        document.body.appendChild(element);
        return { element, memory };
    });
}
function updateMemoryBeacons() {
    if (!viewer.camera) {
        window.requestAnimationFrame(updateMemoryBeacons);
        return;
    }
    memoryBeaconElements.forEach(({ element, memory }) => {
        if (!memoryBeaconsVisible) {
            element.classList.remove('visible');
            element.classList.remove('near');
            return;
        }
        if (projectSceneBeacon(memory.anchor, element)) {
            const cameraDistance = viewer.camera.position.distanceTo(memory.anchor);
            element.classList.toggle('near', cameraDistance <= MEMORY_REVEAL_DISTANCE);
        }
    });
    window.requestAnimationFrame(updateMemoryBeacons);
}
function toggleMemoryBeacons() {
    ensureMemoryBeacons();
    memoryBeaconsVisible = !memoryBeaconsVisible;
    if (!memoryBeaconsVisible) {
        memoryOverlay.classList.remove('visible');
        memoryOverlay.setAttribute('aria-hidden', 'true');
    }
}
function updateViewIndicator() { if (viewer.camera?.position) { enforceCameraConstraints(); const { x, y, z } = viewer.camera.position; viewIndicatorCoords.textContent = `X ${x.toFixed(2)} Y ${y.toFixed(2)} Z ${z.toFixed(2)}`; const currentDistance = viewer.camera.position.distanceTo(initialLookAtVector); const zoomPercent = Math.max(MIN_ZOOM_PERCENT, Math.round((zoomReferenceDistance / currentDistance) * 100)); viewIndicatorZoom.textContent = `${zoomPercent}%`; } window.requestAnimationFrame(updateViewIndicator); }
async function startAmbientAudio() { if (audioStarted) return; audioStarted = true; try { ambientAudio.muted = false; ambientAudio.volume = 0.6; await ambientAudio.play(); } catch (err) { console.error(err); ambientAudio.muted = true; } updateAudioButton(); }
window.addEventListener('pointerdown', hideHint, { once: true });
window.addEventListener('wheel', hideHint, { once: true });
window.addEventListener('keydown', hideHint, { once: true });
window.addEventListener('pointerdown', hideHeroTitle, { once: true });
window.addEventListener('wheel', hideHeroTitle, { once: true });
window.addEventListener('keydown', hideHeroTitle, { once: true });
window.addEventListener('pointerdown', startAmbientAudio, { once: true });
window.addEventListener('keydown', startAmbientAudio, { once: true });
audioToggle.addEventListener('click', async () => { if (!audioStarted) { await startAmbientAudio(); return; } if (ambientAudio.paused || ambientAudio.muted) { ambientAudio.muted = false; await ambientAudio.play(); } else { ambientAudio.muted = true; } updateAudioButton(); });
sceneHotspot.addEventListener('click', () => {
    if (!sceneHotspot.classList.contains('near')) return;
    const mapToggle = document.getElementById('map-toggle');
    if (mapToggle) mapToggle.click();
});
memoryClose.addEventListener('click', () => {
    memoryOverlay.classList.remove('visible');
    memoryOverlay.setAttribute('aria-hidden', 'true');
});
memoryOverlay.addEventListener('click', (event) => {
    if (event.target !== memoryOverlay) return;
    memoryOverlay.classList.remove('visible');
    memoryOverlay.setAttribute('aria-hidden', 'true');
});
updateAudioButton();
updateViewIndicator();
updateSceneHotspot();
updateMemoryBeacons();
async function loadScene() {
    try {
        const response = await fetch('../../PK.ksplat');
        if (!response.ok) throw new Error(`HTTP ${response.status} while fetching PK.ksplat`);
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);
        await viewer.addSplatScene(blobUrl, { format: GaussianSplats3D.SceneFormat.KSplat, rotation: [modelRotation.x, modelRotation.y, modelRotation.z, modelRotation.w], showLoadingUI: false, progressiveLoad: false });
        if (viewer.controls) { viewer.controls.minPolarAngle = 0; viewer.controls.maxPolarAngle = Math.PI; viewer.controls.enablePan = true; viewer.controls.maxDistance = maxCameraDistance; viewer.controls.update(); }
        enforceCameraConstraints();
        info.classList.add('hidden');
        window.setTimeout(() => { info.style.display = 'none'; }, 450);
        viewer.start();
        bindCoordinatePicker();
        showHeroTitle();
    } catch (err) {
        console.error(err);
        info.innerHTML = '<div class="loading-shell"><div class="loading-text">Load failed</div></div>';
    }
}
loadScene();
const reviewMemosButton = document.getElementById('review-memos');
if (reviewMemosButton) {
    const replacement = reviewMemosButton.cloneNode(true);
    reviewMemosButton.replaceWith(replacement);
    replacement.addEventListener('click', toggleMemoryBeacons);
}
window.addEventListener('keydown', (event) => {
    if (event.key !== 'Escape') return;
    memoryOverlay.classList.remove('visible');
    memoryOverlay.setAttribute('aria-hidden', 'true');
});
</script>
