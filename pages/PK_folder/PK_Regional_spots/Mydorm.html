    }
];

function enforceCameraConstraints() {
    if (!viewer.camera?.position) return;

    const cameraPosition = viewer.camera.position;
    const distanceFromCenter = cameraPosition.distanceTo(initialLookAtVector);
    if (distanceFromCenter > maxCameraDistance) {
        cameraPosition.sub(initialLookAtVector).setLength(maxCameraDistance).add(initialLookAtVector);
    } else if (distanceFromCenter < minCameraDistance) {
        cameraPosition.sub(initialLookAtVector).setLength(minCameraDistance).add(initialLookAtVector);
    }

    if (viewer.controls) viewer.controls.update();
}

function updateViewIndicator() {
    if (viewer.camera?.position) {
        enforceCameraConstraints();
        const { x, y, z } = viewer.camera.position;
        viewIndicatorCoords.textContent = `X ${x.toFixed(2)} Y ${y.toFixed(2)} Z ${z.toFixed(2)}`;
        const currentDistance = viewer.camera.position.distanceTo(initialLookAtVector);
        const zoomPercent = Math.max(1, Math.round((zoomReferenceDistance / currentDistance) * 100));
        viewIndicatorZoom.textContent = `${zoomPercent}%`;
    }

    window.requestAnimationFrame(updateViewIndicator);
}

function hideHint() {
    if (!hint || hint.classList.contains('hidden')) return;
    hint.classList.add('hidden');
    window.setTimeout(() => {
        hint.style.display = 'none';
    }, 350);
}

function hideHeroTitle() {
    if (!heroTitle || !heroTitle.classList.contains('visible') || heroTitle.classList.contains('hidden')) return;
    heroTitle.classList.add('hidden');
    document.body.classList.add('intro-mask-hidden');
    window.setTimeout(() => {
        heroTitle.style.display = 'none';
    }, 2000);
}

function showHeroTitle() {
    heroTitle.style.display = 'flex';
    heroTitle.classList.remove('hidden');
    document.body.classList.remove('intro-mask-hidden');
    window.requestAnimationFrame(() => {
        heroTitle.classList.add('visible');
    });
}

function updateAudioButton() {
    audioToggle.textContent = ambientAudio.muted || ambientAudio.paused ? 'Sound Off' : 'Sound On';
}

function projectSceneBeacon(anchor, element) {
    const projectedPoint = anchor.clone().project(viewer.camera);
    const isVisible = projectedPoint.z > -1 && projectedPoint.z < 1
        && projectedPoint.x >= -1.15 && projectedPoint.x <= 1.15
        && projectedPoint.y >= -1.15 && projectedPoint.y <= 1.15;
    if (!isVisible) {
        element.classList.remove('visible');
        element.classList.remove('near');
        return false;
    }
    const x = ((projectedPoint.x + 1) / 2) * window.innerWidth;
    const y = ((-projectedPoint.y + 1) / 2) * window.innerHeight;
    element.style.left = `${x}px`;
    element.style.top = `${y}px`;
    element.classList.add('visible');
    return true;
}

function openMemory(memory) {
    const collagePresets = [
        { tx: '-160px', ty: '-88px', rot: '-9deg', scale: '0.96', z: 2 },
        { tx: '132px', ty: '-76px', rot: '7deg', scale: '1.02', z: 4 },
        { tx: '-18px', ty: '18px', rot: '-2deg', scale: '1.06', z: 6 },
        { tx: '-146px', ty: '92px', rot: '8deg', scale: '0.98', z: 3 },
        { tx: '156px', ty: '84px', rot: '-7deg', scale: '0.95', z: 5 },
        { tx: '8px', ty: '-146px', rot: '4deg', scale: '0.92', z: 1 }
    ];

    activeMemory = memory;
    memoryKicker.textContent = memory.kicker;
    memoryTitle.textContent = memory.title;
    memoryCopy.textContent = memory.copy;
    const hasMultiple = memory.images.length > 1;
    memoryGallery.classList.toggle('has-multiple', hasMultiple);
    memoryGallery.innerHTML = memory.images.map((imagePath, index) => {
        const preset = collagePresets[index % collagePresets.length];
        const style = hasMultiple
            ? ` style="--tx:${preset.tx};--ty:${preset.ty};--rot:${preset.rot};--scale:${preset.scale};--z:${preset.z};"`
            : '';
        return `<figure class="memory-photo" data-image-index="${index}"${style}><img src="${imagePath}" alt="${memory.title} photo ${index + 1}"></figure>`;
    }).join('');
    memoryOverlay.classList.add('visible');
    memoryOverlay.setAttribute('aria-hidden', 'false');
}

function updateMemoryLightbox() {
    if (!activeMemory?.images?.length) return;
    const imageCount = activeMemory.images.length;
    const safeIndex = ((activeMemoryImageIndex % imageCount) + imageCount) % imageCount;
    activeMemoryImageIndex = safeIndex;
    memoryLightboxImage.src = activeMemory.images[safeIndex];
    memoryLightboxImage.alt = `${activeMemory.title} photo ${safeIndex + 1}`;
    memoryLightboxMeta.textContent = `${safeIndex + 1} / ${imageCount}`;
    const showNav = imageCount > 1;
    memoryLightboxPrev.style.display = showNav ? 'inline-flex' : 'none';
    memoryLightboxNext.style.display = showNav ? 'inline-flex' : 'none';
}

function openMemoryLightbox(index) {
    if (!activeMemory?.images?.length) return;
    activeMemoryImageIndex = index;
    updateMemoryLightbox();
    memoryLightbox.classList.add('visible');
    memoryLightbox.setAttribute('aria-hidden', 'false');
}

function closeMemoryLightbox() {
    memoryLightbox.classList.remove('visible');
    memoryLightbox.setAttribute('aria-hidden', 'true');
}

function stepMemoryLightbox(direction) {
    if (!activeMemory?.images?.length) return;
    activeMemoryImageIndex += direction;
    updateMemoryLightbox();
}

function ensureMemoryBeacons() {
    if (memoryBeaconElements.length) return;
    memoryBeaconElements = MEMORY_BEACONS.map((memory) => {
        const element = document.createElement('button');
        element.type = 'button';
        element.className = 'scene-beacon memory-beacon';
        element.setAttribute('aria-label', `Open memory ${memory.title}`);
        element.innerHTML = `<span class="scene-beacon-core" aria-hidden="true"></span><span class="scene-beacon-label">${memory.label}</span>`;
        element.addEventListener('click', () => {
            if (!element.classList.contains('near')) return;
            openMemory(memory);
        });
        document.body.appendChild(element);
        return { element, memory };
    });
}

function updateMemoryBeacons() {
    if (!viewer.camera) {
        window.requestAnimationFrame(updateMemoryBeacons);
        return;
    }
    memoryBeaconElements.forEach(({ element, memory }) => {
        if (!memoryBeaconsVisible) {
            element.classList.remove('visible');
            element.classList.remove('near');
            return;
        }
        if (projectSceneBeacon(memory.anchor, element)) {
            const cameraDistance = viewer.camera.position.distanceTo(memory.anchor);
            element.classList.toggle('near', cameraDistance <= MEMORY_REVEAL_DISTANCE);
        }
    });
    window.requestAnimationFrame(updateMemoryBeacons);
}

function toggleMemoryBeacons() {
    ensureMemoryBeacons();
    memoryBeaconsVisible = !memoryBeaconsVisible;
    if (!memoryBeaconsVisible) {
        memoryOverlay.classList.remove('visible');
        memoryOverlay.setAttribute('aria-hidden', 'true');
    }
}

async function startAmbientAudio() {
    if (audioStarted) return;
    audioStarted = true;
    try {
        ambientAudio.muted = false;
        ambientAudio.volume = 0.6;
        await ambientAudio.play();
    } catch (err) {
        console.error(err);
        ambientAudio.muted = true;
    }
    updateAudioButton();
}

window.addEventListener('pointerdown', hideHint, { once: true });
window.addEventListener('wheel', hideHint, { once: true });
window.addEventListener('keydown', hideHint, { once: true });
window.addEventListener('pointerdown', hideHeroTitle, { once: true });
window.addEventListener('wheel', hideHeroTitle, { once: true });
window.addEventListener('keydown', hideHeroTitle, { once: true });
window.addEventListener('pointerdown', startAmbientAudio, { once: true });
window.addEventListener('keydown', startAmbientAudio, { once: true });

audioToggle.addEventListener('click', async () => {
    if (!audioStarted) {
        await startAmbientAudio();
        return;
    }
    if (ambientAudio.paused || ambientAudio.muted) {
        ambientAudio.muted = false;
        await ambientAudio.play();
    } else {
        ambientAudio.muted = true;
    }
    updateAudioButton();
});

updateAudioButton();
updateViewIndicator();
updateMemoryBeacons();

memoryClose.addEventListener('click', () => {
    memoryOverlay.classList.remove('visible');
    memoryOverlay.setAttribute('aria-hidden', 'true');
});

memoryOverlay.addEventListener('click', (event) => {
    if (event.target !== memoryOverlay) return;
    memoryOverlay.classList.remove('visible');
    memoryOverlay.setAttribute('aria-hidden', 'true');
});

memoryGallery.addEventListener('click', (event) => {
    const photo = event.target.closest('.memory-photo');
    if (!photo) return;
    const index = Number(photo.dataset.imageIndex || 0);
    openMemoryLightbox(index);
});

memoryLightboxClose.addEventListener('click', closeMemoryLightbox);
memoryLightboxPrev.addEventListener('click', () => stepMemoryLightbox(-1));
memoryLightboxNext.addEventListener('click', () => stepMemoryLightbox(1));

memoryLightbox.addEventListener('click', (event) => {
    if (event.target !== memoryLightbox) return;
    closeMemoryLightbox();
});

window.addEventListener('keydown', (event) => {
    if (memoryLightbox.classList.contains('visible')) {
        if (event.key === 'Escape') {
            closeMemoryLightbox();
        } else if (event.key === 'ArrowLeft') {
            stepMemoryLightbox(-1);
        } else if (event.key === 'ArrowRight') {
            stepMemoryLightbox(1);
        }
        return;
    }

    if (memoryOverlay.classList.contains('visible') && event.key === 'Escape') {
        memoryOverlay.classList.remove('visible');
        memoryOverlay.setAttribute('aria-hidden', 'true');
    }
});

async function loadScene() {
    try {
        const response = await fetch('../../../Scenes/Mydorm.ksplat');
        if (!response.ok) throw new Error(`HTTP ${response.status} while fetching Mydorm.ksplat`);
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);
        await viewer.addSplatScene(blobUrl, {
            format: GaussianSplats3D.SceneFormat.KSplat,
            rotation: [modelRotation.x, modelRotation.y, modelRotation.z, modelRotation.w],
            showLoadingUI: false,
            progressiveLoad: false
        });
        if (viewer.controls) {
            viewer.controls.minPolarAngle = 0;
            viewer.controls.maxPolarAngle = Math.PI;
            viewer.controls.enablePan = true;
            viewer.controls.minDistance = minCameraDistance;
            viewer.controls.maxDistance = maxCameraDistance;
            viewer.controls.update();
        }
        enforceCameraConstraints();
        info.classList.add('hidden');
        window.setTimeout(() => {
            info.style.display = 'none';
        }, 450);
        viewer.start();
        document.body.classList.remove('scene-loading');
        bindSceneCoordinatePicker({ viewer, THREE });
        showHeroTitle();
    } catch (err) {
        console.error(err);
        info.innerHTML = '<div class="loading-shell"><div class="loading-text">Load failed</div></div>';
    }
}

loadScene();

const reviewMemosButton = document.getElementById('review-memos');
if (reviewMemosButton) {
    const replacement = reviewMemosButton.cloneNode(true);
    reviewMemosButton.replaceWith(replacement);
    replacement.addEventListener('click', toggleMemoryBeacons);
}

window.addEventListener('keydown', (event) => {
    if (event.key !== 'Escape') return;
    memoryOverlay.classList.remove('visible');
    memoryOverlay.setAttribute('aria-hidden', 'true');
});
</script>
</body>
