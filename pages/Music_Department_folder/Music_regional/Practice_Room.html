<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Practice Room - Atlantic College Memo</title>
    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
        }

        #info {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            pointer-events: none;
            transition: opacity 0.45s ease;
        }

        #info.hidden { opacity: 0; }
        #hint {
            position: fixed;
            left: 50%;
            bottom: 22px;
            transform: translateX(-50%);
            z-index: 120;
            max-width: min(92vw, 420px);
            padding: 12px 16px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(10px);
            color: rgba(255,255,255,0.88);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 12px;
            text-align: center;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        #hint.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(10px);
        }

        #view-indicator {
            position: fixed;
            top: 68px;
            right: 18px;
            z-index: 150;
            min-width: 228px;
            padding: 12px 14px;
            border-radius: 18px;
            background: rgba(0,0,0,0.58);
            border: 1px solid rgba(255,255,255,0.14);
            backdrop-filter: blur(12px);
            box-shadow: 0 14px 30px rgba(0,0,0,0.24);
            color: rgba(255,255,255,0.92);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        .view-indicator-label {
            display: block;
            color: rgba(255,255,255,0.54);
            font-size: 10px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        .view-indicator-value {
            display: block;
            margin-top: 4px;
            font-size: 12px;
            letter-spacing: 0.04em;
            line-height: 1.45;
        }

        .view-indicator-row + .view-indicator-row { margin-top: 10px; }

        #hero-title {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 130;
            pointer-events: none;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 2s ease, transform 2s ease;
        }

        #hero-title.visible { opacity: 1; transform: translateY(0); }
        #hero-title.hidden { opacity: 0; transform: translateY(-10px); }

        .hero-text {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            max-width: min(92vw, 980px);
            padding: 0 24px;
            color: rgba(255,255,255,0.94);
            font-family: "Times New Roman", Times, serif;
            text-align: center;
        }

        .hero-title-line {
            font-size: clamp(40px, 7vw, 92px);
            font-weight: 700;
            letter-spacing: 0.03em;
            line-height: 0.95;
            text-shadow: 0 1px 0 rgba(255,255,255,0.12), 0 12px 24px rgba(0,0,0,0.42), 0 24px 60px rgba(0,0,0,0.48);
        }

        .hero-subtitle {
            color: rgba(255,255,255,0.76);
            font-size: clamp(14px, 1.4vw, 22px);
            font-weight: 400;
            letter-spacing: 0.18em;
            line-height: 1.2;
            text-shadow: 0 8px 22px rgba(0,0,0,0.35);
        }

        .loading-shell {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 24px 28px;
            border-radius: 999px;
            background: radial-gradient(circle at top, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
            border: 1px solid rgba(255,255,255,0.14);
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.45);
        }

        .loading-ring {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.16);
            border-top-color: rgba(255,255,255,0.95);
            animation: spin 0.9s linear infinite;
        }

        .loading-text {
            color: rgba(255,255,255,0.94);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 12px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            padding-left: 0.28em;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div id="info"><div class="loading-shell"><div class="loading-ring" aria-hidden="true"></div><div class="loading-text">Loading</div></div></div>
<nav id="nav" aria-label="Primary"></nav>
<div id="hero-title"><div class="hero-text"><div class="hero-title-line">Practice Room</div><div class="hero-subtitle">A quieter sub-location inside Music</div></div></div>
<div id="hint">Drag to orbit. Scroll to zoom. Shift+drag to pan.</div>
<div id="view-indicator" aria-live="polite"><div class="view-indicator-row"><span class="view-indicator-label">Coordinates</span><span class="view-indicator-value" id="view-indicator-coords">X 0.00 Y -8.00 Z 8.00</span></div><div class="view-indicator-row"><span class="view-indicator-label">Zoom</span><span class="view-indicator-value" id="view-indicator-zoom">100%</span></div></div>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}
</script>
<script type="module">
import * as GaussianSplats3D from 'https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js';
import * as THREE from 'three';
import { initSharedChrome } from '../../shared-chrome.js';

const info = document.getElementById('info');
const hint = document.getElementById('hint');
const heroTitle = document.getElementById('hero-title');
const viewIndicatorCoords = document.getElementById('view-indicator-coords');
const viewIndicatorZoom = document.getElementById('view-indicator-zoom');

initSharedChrome({
    homeHref: '../../../index.html',
    regionalMap: {
        caption: 'Music Regional Map',
        center: { label: 'Practice Room', left: '38%', top: '45%' },
        lines: [
            { left: '38%', top: '50%', width: '18%', rotate: '-18deg' },
            { left: '33%', top: '46%', width: '16%', rotate: '182deg' }
        ],
        nodes: [
            { label: 'Music Classroom', href: './Music_Classroom.html', left: '58%', top: '34%' },
            { label: 'My Corner', href: './My_Corner.html', left: '16%', top: '56%' }
        ],
        placeCard: {
            kicker: 'Branch',
            title: 'Inside Music',
            copy: 'This regional map keeps the navigation inside the Music Department cluster.',
            actions: []
        }
    },
    keepSubpagesPanel: true
});

const initialCameraPosition = [0, -8, 8];
const initialCameraLookAt = [0, 0, 0];
const initialLookAtVector = new THREE.Vector3(...initialCameraLookAt);
const initialDistance = new THREE.Vector3(...initialCameraPosition).distanceTo(initialLookAtVector);
const modelRotation = new THREE.Quaternion().setFromEuler(new THREE.Euler(Math.PI, 0, 0));
const viewer = new GaussianSplats3D.Viewer({
    initialCameraPosition,
    initialCameraLookAt,
    sharedMemoryForWorkers: false,
    gpuAcceleratedSort: false,
    dynamicScene: true,
    sceneRevealMode: GaussianSplats3D.SceneRevealMode.Gradual,
    sceneFadeInRateMultiplier: 0.8
});

function updateViewIndicator() {
    if (viewer.camera?.position) {
        const { x, y, z } = viewer.camera.position;
        viewIndicatorCoords.textContent = `X ${x.toFixed(2)} Y ${y.toFixed(2)} Z ${z.toFixed(2)}`;
        const currentDistance = viewer.camera.position.distanceTo(initialLookAtVector);
        const zoomPercent = Math.max(1, Math.round((initialDistance / currentDistance) * 100));
        viewIndicatorZoom.textContent = `${zoomPercent}%`;
    }
    window.requestAnimationFrame(updateViewIndicator);
}

function hideHint() {
    if (!hint || hint.classList.contains('hidden')) return;
    hint.classList.add('hidden');
    window.setTimeout(() => {
        hint.style.display = 'none';
    }, 350);
}

function hideHeroTitle() {
    if (!heroTitle || !heroTitle.classList.contains('visible') || heroTitle.classList.contains('hidden')) return;
    heroTitle.classList.add('hidden');
    window.setTimeout(() => {
        heroTitle.style.display = 'none';
    }, 2000);
}

function showHeroTitle() {
    heroTitle.style.display = 'flex';
    heroTitle.classList.remove('hidden');
    window.requestAnimationFrame(() => {
        heroTitle.classList.add('visible');
    });
}

window.addEventListener('pointerdown', hideHint, { once: true });
window.addEventListener('wheel', hideHint, { once: true });
window.addEventListener('keydown', hideHint, { once: true });
window.addEventListener('pointerdown', hideHeroTitle, { once: true });
window.addEventListener('wheel', hideHeroTitle, { once: true });
window.addEventListener('keydown', hideHeroTitle, { once: true });

updateViewIndicator();

async function loadScene() {
    try {
        const response = await fetch('../../../Scenes/practice_room1.ksplat');
        if (!response.ok) throw new Error(`HTTP ${response.status} while fetching practice_room1.ksplat`);
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);
        await viewer.addSplatScene(blobUrl, {
            format: GaussianSplats3D.SceneFormat.KSplat,
            rotation: [modelRotation.x, modelRotation.y, modelRotation.z, modelRotation.w],
            showLoadingUI: false,
            progressiveLoad: false
        });
        if (viewer.controls) {
            viewer.controls.minPolarAngle = 0;
            viewer.controls.maxPolarAngle = Math.PI;
            viewer.controls.enablePan = true;
            viewer.controls.update();
        }
        info.classList.add('hidden');
        window.setTimeout(() => {
            info.style.display = 'none';
        }, 450);
        viewer.start();
        showHeroTitle();
    } catch (err) {
        console.error(err);
        info.innerHTML = '<div class="loading-shell"><div class="loading-text">Load failed</div></div>';
    }
}

loadScene();
</script>
</body>
</html>
